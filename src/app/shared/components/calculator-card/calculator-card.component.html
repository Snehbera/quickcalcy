<a [routerLink]="calculator.route" class="calc-card card flex flex-col items-center text-center gap-sm">
  <div class="calc-icon-wrapper flex items-center justify-center">
    <span class="calc-icon text-4xl">{{ calculator.icon }}</span>
  </div>
  <h3 class="calc-title text-lg font-semibold">{{ calculator.title }}</h3>
  <p class="calc-desc text-sm text-muted">{{ calculator.description }}</p>
</a>
